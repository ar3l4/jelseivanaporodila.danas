<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 1200px; height: 630px; }
    body {
      background: #f4efe2;
      color: #1b1b1a;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 64px 80px;
      position: relative;
    }
    .kicker {
      text-transform: uppercase;
      letter-spacing: 0.24em;
      font-size: 22px;
      font-weight: 700;
      color: #857c68;
      padding-bottom: 20px;
      border-bottom: 3px solid #1b1b1a;
    }
    .verdict {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 300px;
      line-height: 0.9;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #2f7d5b;
      margin: 8px 0;
    }
    .subtitle {
      font-family: Georgia, "Times New Roman", serif;
      font-style: italic;
      font-size: 46px;
      margin-top: 8px;
    }
    .emoji { font-size: 120px; position: absolute; top: 70px; right: 90px; }
  </style>
</head>
<body>
  <div class="emoji">👶</div>
  <p class="kicker">Je l' se Ivana porodila?</p>
  <h1 class="verdict">DA!</h1>
  <p class="subtitle">Filip je konačno stigao! 🎉</p>
</body>
</html>
