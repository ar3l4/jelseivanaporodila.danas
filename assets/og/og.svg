<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#f4efe2"/>

  <!-- kicker -->
  <text x="80" y="110" font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="26" font-weight="700" letter-spacing="6" fill="#857c68">JE L' SE IVANA PORODILA?</text>
  <line x1="80" y1="135" x2="1120" y2="135" stroke="#1b1b1a" stroke-width="3"/>

  <!-- verdict -->
  <text x="74" y="430" font-family="Georgia, 'Times New Roman', serif"
        font-size="300" font-weight="700" letter-spacing="-4" fill="#2f7d5b">DA!</text>

  <!-- subtitle -->
  <text x="80" y="510" font-family="Georgia, 'Times New Roman', serif"
        font-size="48" font-style="italic" fill="#1b1b1a">Filip je konačno stigao! 🎉</text>

  <!-- decorative circle / balloon -->
  <circle cx="1050" cy="250" r="150" fill="none" stroke="#2f7d5b" stroke-width="6" opacity="0.25"/>
  <text x="1050" y="300" text-anchor="middle" font-size="150">👶</text>

  <!-- bottom strip -->
  <text x="1120" y="565" text-anchor="end" font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="24" font-weight="700" fill="#857c68">„STIGAO JE! KONAČNO!"</text>
</svg>
